[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NEXT_PUBLIC_API_BASE must be set in the Netlify UI (Site settings ->
# Environment variables) to your deployed backend's URL, e.g.
# https://football-prediction-hub-api.onrender.com
# It can't live here since it's not a secret but it IS deployment-specific.
