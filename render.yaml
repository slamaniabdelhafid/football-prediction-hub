services:
  - type: web
    name: football-prediction-hub-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
        # Update this in the Render dashboard after your Netlify site is live,
        # e.g. http://localhost:3000,https://your-site.netlify.app
